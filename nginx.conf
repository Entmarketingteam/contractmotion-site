server {
    listen PORT_PLACEHOLDER default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = /robots.txt { alias /usr/share/nginx/html/robots.txt; }
    location = /sitemap.xml { alias /usr/share/nginx/html/sitemap.xml; }

    location = /industries {
        try_files /industries.html =404;
    }
    location = /power-grid {
        try_files /power-grid.html =404;
    }
    location = /data-center {
        try_files /data-center.html =404;
    }
    location = /water-wastewater {
        try_files /water-wastewater.html =404;
    }
    location = /industrial {
        try_files /industrial.html =404;
    }
    location = /defense {
        try_files /defense.html =404;
    }
    location = /nuclear {
        try_files /nuclear.html =404;
    }
    location = /drone-dfr {
        try_files /drone-dfr.html =404;
    }
    location = /privacy-policy {
        try_files /privacy-policy.html =404;
    }
    location = /healthcare {
        try_files /healthcare.html =404;
    }

    # Cache static assets
    location ~* \.(css|js|ico|woff2|woff|ttf|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache HTML with short TTL
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# healthcare.contractmotion.com subdomain
server {
    listen PORT_PLACEHOLDER;
    server_name healthcare.contractmotion.com;
    root /usr/share/nginx/html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location ~* \.(css|js|ico|woff2|woff|ttf|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files /healthcare.html =404;
    }
}
